<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#090912"/>
    </radialGradient>
    <radialGradient id="ball" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffed6f"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f5c51844"/>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- 로또 공 -->
  <circle cx="96" cy="96" r="68" fill="url(#ball)" filter="url(#shadow)"/>
  <!-- 하이라이트 -->
  <ellipse cx="78" cy="72" rx="20" ry="14" fill="white" fill-opacity="0.25"/>
  <!-- 숫자 텍스트 -->
  <text x="96" y="114" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#1a1a1a">AI</text>
</svg>